services:
  - type: web
    name: mcq-app
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
    disk:
      name: mcq-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
